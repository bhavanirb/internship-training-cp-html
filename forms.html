
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic html forms</title>
</head>
<body>
    <form>
        <label for="name">Name</label>
        <input type="text" id="myName" name="name" placeholder="enter your name"><br><br>

        <label for="emailId">Email</label>
        <input type="email" id="emailId" name="email" placeholder="enter your email"><br><br>

        <label for="passwordId">Password</label>
        <input type="password" id="passwordId" name="password"><br><br>


        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="password"><br><br>


        <label for="dobId">Date</label>
        <input type="date" id="dobId" name="dob"><br><br>


        <label for="mailId">Mail</label>
        <input type="radio" id="mailId" name="gender"  value="mail">
        <label for="femailId">Femail</label>
        <input type="radio" id="femailId" name="gender" value="femail">
        <label for="otherId">Others</label>
        <input type="radio" id="otherId" name="gender" value="others"><br><br>

        <p>Select your Hobbies</p><br>

        <label for="Coding">Coding</label>
        <input type="checkbox" id="coding" name="hobbies" value="coding">

        <label for="dancing">Dancing</label>
        <input type="checkbox" id="dancing" name="hobbies" value="dancing">

        <label for="singing">Singing</label>
        <input type="checkbox" id="singing" name="hobbies" value="singing">

        <label for="acting">Acting</label>
        <input type="checkbox" id="acting" name="hobbies" value="acting"><br><br>


        <label for="hobbies-menu">Select hobbies</label><br>
        <select name="hobbies" id="hobby-delect" multiple>
         <option value="Coding">Coding</option>
         <option value="Dancing">Dancing</option>
         <option value="singing">Singing</option>
         <option value="Acting">Acting</option>
         <option value="learning">Learning</option>

        </select><br><br>
        
         

        <input type="submit" value="submit" name="submit">

        

        
        
    </form>
</body>
</html>
