<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusPe Registration</title>
</head>

<body>

<center>
<h3>Register to CampusPe</h3>

<form method="post">

<label for="nameId">Name</label>
<input id="nameId" type="text" name="name" placeholder="Enter your name"><br><br>

<label for="emailId">Email</label>
<input id="emailId" type="email" name="email" placeholder="Enter your Email" required><br><br>

<label for="phoneId">Phone</label>
<input id="phoneId" type="number" name="phone" placeholder="Enter your phone number"><br><br>

<label for="passwordId">Password</label>
<input id="passwordId" type="password" name="password"><br><br>

<label for="confirmPasswordId">Confirm Password</label>
<input id="confirmPasswordId" type="password" name="confirm_password"><br><br>

<label>Choose Your Gender</label><br>
<input type="radio" name="gender" value="male"> Male
<input type="radio" name="gender" value="female"> Female
<input type="radio" name="gender" value="other"> Other
<br><br>

<label>Select your Hobbies</label><br>
<input type="checkbox" name="hobby" value="coding"> Coding
<input type="checkbox" name="hobby" value="dancing"> Dancing
<input type="checkbox" name="hobby" value="singing"> Singing
<input type="checkbox" name="hobby" value="acting"> Acting
<br><br>

<label for="courseId">Select your Course</label>
<select id="courseId" name="course">
<option value="btech">BTech</option>
<option value="bsc">BSc</option>
<option value="bca">BCA</option>
<option value="bcom">BCom</option>
</select>
<br><br>

<label for="dobId">Date of Birth</label>
<input type="date" id="dobId" name="dob">
<br><br>

<input type="reset" value="Reset">
<input type="submit" value="Submit">

</form>

</center>

</body>
</html>
